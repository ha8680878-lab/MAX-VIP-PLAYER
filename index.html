<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>MAX VIP PLAYER - LG WebOS Edition</title>
    <link href="https://vjs.zencdn.net/7.10.2/video-js.css" rel="stylesheet" />
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        .container { width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        .logo-box { margin-bottom: 20px; text-align: center; }
        .brand-logo { width: 150px; border-radius: 20px; border: 2px solid #ff6600; }

        .login-form { background: rgba(20,20,20,0.9); padding: 30px; border-radius: 20px; width: 400px; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; background: #333; color: #fff; font-size: 18px; text-align: center; }
        .btn { width: 100%; padding: 20px; background: #ff6600; color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 20px; cursor: pointer; }

        #player-layer { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; background: #000; }
        .error-msg { color: #ff3333; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>

<div class="container" id="auth-layer">
    <div class="logo-box">
        <img src="https://i.postimg.cc/Y9nDffmm/IMG-20260322-165940-496.webp" class="brand-logo">
    </div>
    <div class="login-form">
        <input type="text" id="host" placeholder="رابط السيرفر مع البورت">
        <input type="text" id="user" placeholder="اسم المستخدم">
        <input type="password" id="pass" placeholder="كلمة المرور">
        <div id="status" class="error-msg"></div>
        <button class="btn" onclick="startLGPlayer()">دخول وتوصيل</button>
    </div>
</div>

<div id="player-layer">
    <video id="lg-video" class="video-js vjs-fill vjs-default-skin" controls autoplay preload="auto"></video>
</div>

<script src="https://vjs.zencdn.net/7.10.2/video.min.js"></script>
<script>
    function startLGPlayer() {
        const host = document.getElementById('host').value.trim();
        const user = document.getElementById('user').value.trim();
        const pass = document.getElementById('pass').value.trim();
        const status = document.getElementById('status');

        if(!host || !user || !pass) {
            status.innerText = "يرجى إكمال البيانات";
            return;
        }

        // تحويل الرابط إلى صيغة متوافقة مع WebOS
        // نستخدم 1.m3u8 كقناة تجريبية أولى للتأكد من الاتصال
        const streamUrl = `${host}/live/${user}/${pass}/1.m3u8`;
        
        // سر النجاح في WebOS: استخدام رابط مباشر بدون HTTPS إذا كان السيرفر يدعم ذلك
        // أو استخدام بروكسي "CORS-Anywhere"
        status.innerText = "جاري الاتصال بالسيرفر...";

        try {
            document.getElementById('auth-layer').style.display = 'none';
            document.getElementById('player-layer').style.display = 'block';
            
            const player = videojs('lg-video');
            player.src({
                src: streamUrl,
                type: 'application/x-mpegURL'
            });

            player.play();
            
            player.on('error', function() {
                status.innerText = "خطأ: السيرفر يرفض الاتصال من المتصفح";
                document.getElementById('auth-layer').style.display = 'flex';
                document.getElementById('player-layer').style.display = 'none';
            });

        } catch (e) {
            status.innerText = "فشل في تشغيل المحرك";
        }
    }
</script>
</body>
</html>
