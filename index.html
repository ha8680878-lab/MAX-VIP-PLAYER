<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAX VIP PLAYER - Interactive</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --brand-orange: #ff6600; --brand-purple: #8e24aa; }
        body { 
            margin: 0; padding: 0; min-height: 100vh; font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(-45deg, #1a0524, #000, #2d0b3d, #050505);
            background-size: 400% 400%; animation: gradientBG 15s ease infinite;
            color: white; overflow-x: hidden; display: flex; justify-content: center; align-items: center;
        }
        @keyframes gradientBG { 0% {background-position:0% 50%} 50% {background-position:100% 50%} 100% {background-position:0% 50%} }

        .container { width: 95%; max-width: 500px; text-align: center; z-index: 10; padding: 20px; }

        /* الشعار والهالة */
        .logo-wrapper { position: relative; display: inline-block; margin-bottom: 10px; }
        .logo-glow { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 140px; height: 140px; border-radius: 50%; background: var(--brand-orange); filter: blur(40px); opacity: 0.4; animation: pulse 3s infinite; z-index: -1; }
        @keyframes pulse { 0%, 100% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.3; } 50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.6; } }
        .brand-logo { width: 130px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        /* عداد المستخدمين والتقييم */
        .live-stats { font-size: 12px; color: #00ff80; margin-bottom: 10px; }
        .rating-stars { margin-bottom: 20px; color: #ffcc00; cursor: pointer; }

        .login-box { background: rgba(255, 255, 255, 0.08); padding: 25px; border-radius: 30px; backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.15); }
        input { padding: 14px; margin: 8px 0; width: 85%; border-radius: 12px; border: none; background: rgba(0,0,0,0.4); color: #fff; text-align: center; outline: none; }
        .btn-connect { padding: 15px; background: linear-gradient(90deg, #ff6600, #ff9100); color: white; border: none; cursor: pointer; border-radius: 12px; font-weight: bold; width: 100%; margin-top: 10px; }

        /* نظام المحادثة */
        #chat-icon { position: fixed; bottom: 20px; left: 20px; background: var(--brand-orange); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 25px; cursor: pointer; box-shadow: 0 5px 15px rgba(255,102,0,0.4); z-index: 100; }
        #chat-window { position: fixed; bottom: 90px; left: 20px; width: 300px; height: 400px; background: #1a1a1a; border-radius: 15px; border: 1px solid #333; display: none; flex-direction: column; z-index: 100; overflow: hidden; box-shadow: 0 10px 30px #000; }
        #chat-header { background: #222; padding: 10px; font-weight: bold; font-size: 14px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; }
        #chat-messages { flex: 1; padding: 10px; overflow-y: auto; font-size: 13px; text-align: right; }
        #chat-input-area { padding: 10px; display: flex; gap: 5px; border-top: 1px solid #333; }
        #chat-input-area input { flex: 1; padding: 8px; margin: 0; font-size: 13px; }
        .msg { background: #333; padding: 8px; border-radius: 8px; margin-bottom: 10px; position: relative; }
        .msg-time { font-size: 9px; color: #888; display: block; margin-top: 4px; }

        .note-item { background: rgba(0,0,0,0.2); border-right: 3px solid var(--brand-orange); padding: 10px; margin-bottom: 8px; border-radius: 5px; font-size: 12px; text-align: right; }
    </style>
</head>
<body>

<div class="container">
    <div class="live-stats"><i class="fas fa-users"></i> متصل الآن: <span id="user-count">1,240</span> مستخدم</div>
    
    <div class="logo-wrapper">
        <div class="logo-glow"></div>
        <img src="1000045857.webp" class="brand-logo">
    </div>

    <div class="rating-stars" onclick="rate()">
        <i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i>
        <div style="font-size: 10px; color: #ccc; margin-top: 5px;">قيم تجربتك مع MAX VIP</div>
    </div>

    <div id="login-form" class="login-box">
        <input type="text" id="host" placeholder="رابط السيرفر">
        <input type="text" id="user" placeholder="اسم المستخدم">
        <input type="password" id="pass" placeholder="كلمة المرور">
        <button class="btn-connect" onclick="checkConnection()">اتصال بالاشتراك</button>
    </div>

    <div class="notes-container" style="margin-top:20px;">
        <div class="note-item">قد لا تكون الشبكة الخاصة بك متوافقة مع الاشتراك.</div>
        <div class="note-item">تختفي رسائل الدردشة تلقائياً بعد مرور ساعة.</div>
    </div>

    <div id="video-container" style="display:none; width:100%; border-radius:15px; overflow:hidden; margin-top:20px;">
        <video id="my-video" class="video-js vjs-fluid vjs-default-skin" controls></video>
    </div>
</div>

<div id="chat-icon" onclick="toggleChat()"><i class="fas fa-comments"></i></div>
<div id="chat-window">
    <div id="chat-header"><span>دردشة المشتركين 🟢</span> <i class="fas fa-times" onclick="toggleChat()" style="cursor:pointer"></i></div>
    <div id="chat-messages"></div>
    <div id="chat-input-area">
        <input type="text" id="chat-msg-input" placeholder="اكتب رسالتك...">
        <button onclick="sendMessage()" style="background:var(--brand-orange); border:none; border-radius:5px; padding:0 10px; color:white;"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
<script>
    // 1. تحديث عداد المستخدمين بشكل وهمي ذكي
    setInterval(() => {
        let count = Math.floor(Math.random() * (1500 - 1200) + 1200);
        document.getElementById('user-count').innerText = count.toLocaleString();
    }, 5000);

    // 2. نظام التقييم
    function rate() {
        alert("شكراً لتقييمك! نحن نسعى دائماً لتقديم الأفضل لعملاء MAX VIP.");
    }

    // 3. التحكم في نافذة المحادثة
    function toggleChat() {
        const chat = document.getElementById('chat-window');
        chat.style.display = chat.style.display === 'flex' ? 'none' : 'flex';
    }

    // 4. نظام إرسال الرسائل وحذفها بعد ساعة
    function sendMessage() {
        const input = document.getElementById('chat-msg-input');
        if (!input.value) return;

        const msgData = {
            text: input.value,
            time: Date.now()
        };

        let messages = JSON.parse(localStorage.getItem('chat_msgs') || "[]");
        messages.push(msgData);
        localStorage.setItem('chat_msgs', JSON.stringify(messages));
        
        input.value = "";
        renderMessages();
    }

    function renderMessages() {
        const container = document.getElementById('chat-messages');
        const now = Date.now();
        const oneHour = 3600000; // ساعة بالملي ثانية

        let messages = JSON.parse(localStorage.getItem('chat_msgs') || "[]");
        
        // فلترة الرسائل التي مر عليها أكثر من ساعة
        const filteredMessages = messages.filter(m => (now - m.time) < oneHour);
        localStorage.setItem('chat_msgs', JSON.stringify(filteredMessages));

        container.innerHTML = filteredMessages.map(m => `
            <div class="msg">
                ${m.text}
                <span class="msg-time">${new Date(m.time).toLocaleTimeString('ar-EG', {hour: '2-digit', minute:'2-digit'})}</span>
            </div>
        `).join('');
        container.scrollTop = container.scrollHeight;
    }

    // تحديث الرسائل كل دقيقة لفحص الوقت وحذف القديم
    setInterval(renderMessages, 60000);
    renderMessages();

    // تشغيل الفيديو (نفس الكود السابق)
    function checkConnection() {
        const h = document.getElementById('host').value;
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        if(h && u && p) {
            const player = videojs('my-video');
            player.src({ src: `${h}/live/${u}/${p}/1.m3u8`, type: 'application/x-mpegURL' });
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('video-container').style.display = 'block';
            player.play();
        }
    }
</script>
</body>
</html>
