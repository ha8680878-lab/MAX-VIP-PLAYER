<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAX VIP PLAYER - 2026</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --brand-orange: #ff6600; --bg-dark: #000; }
        body { margin: 0; background: var(--bg-dark); color: white; font-family: sans-serif; }
        .container { max-width: 600px; margin: auto; padding: 20px; text-align: center; }
        
        /* الهالة المتوهجة والشعار */
        .logo-wrapper { position: relative; display: inline-block; margin-bottom: 20px; }
        .logo-glow { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 130px; height: 130px; border-radius: 50%; background: var(--brand-orange); 
            filter: blur(40px); opacity: 0.5; animation: pulse 3s infinite; z-index: -1; 
        }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.7; } }
        .brand-logo { width: 120px; border-radius: 20px; }

        .login-box { background: #111; padding: 20px; border-radius: 20px; border: 1px solid #333; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 10px; border: none; background: #222; color: #fff; text-align: center; }
        .btn-connect { width: 95%; padding: 15px; background: var(--brand-orange); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }

        #main-app { display: none; margin-top: 20px; }
        .video-wrapper { border-radius: 15px; overflow: hidden; margin-bottom: 20px; }
        .playlist { background: #111; max-height: 300px; overflow-y: auto; border-radius: 10px; text-align: right; }
        .channel { padding: 10px; border-bottom: 1px solid #222; cursor: pointer; display: flex; align-items: center; }
        .channel:hover { background: #222; }
        .channel img { width: 35px; height: 35px; margin-left: 10px; border-radius: 5px; }
        
        #status { color: #ff6600; font-size: 13px; margin: 10px 0; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-wrapper">
        <div class="logo-glow"></div>
        <img src="https://i.postimg.cc/Y9nDffmm/IMG-20260322-165940-496.webp" class="brand-logo" alt="MAX VIP">
    </div>

    <div id="login-form" class="login-box">
        <h3>مشغل MAX VIP</h3>
        <input type="text" id="host" placeholder="مثال: http://host:port">
        <input type="text" id="user" placeholder="اسم المستخدم">
        <input type="password" id="pass" placeholder="كلمة المرور">
        <div id="status"></div>
        <button class="btn-connect" onclick="fetchM3U()">جلب قوائم التشغيل</button>
    </div>

    <div id="main-app">
        <div class="video-wrapper">
            <video id="my-video" class="video-js vjs-fluid vjs-default-skin" controls></video>
        </div>
        <div class="playlist" id="playlist"></div>
    </div>
</div>

<script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
<script>
    const player = videojs('my-video');

    async function fetchM3U() {
        const host = document.getElementById('host').value;
        const user = document.getElementById('user').value;
        const pass = document.getElementById('pass').value;
        const status = document.getElementById('status');

        if(!host || !user || !pass) return;

        const m3uUrl = `${host}/get.php?username=${user}&password=${pass}&type=m3u_plus&output=ts`;
        
        // استخدام بروكسي لتجاوز قيود CORS في المتصفح
        const proxyUrl = "https://api.allorigins.win/get?url=" + encodeURIComponent(m3uUrl);
        
        status.innerText = "جاري جلب القنوات...";

        try {
            const response = await fetch(proxyUrl);
            const json = await response.json();
            const data = json.contents;

            if (data.includes("#EXTM3U")) {
                parseM3U(data);
                document.getElementById('login-form').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
            } else {
                status.innerText = "فشل الجلب، تأكد من البيانات";
            }
        } catch (e) {
            status.innerText = "خطأ في الاتصال، حاول لاحقاً";
        }
    }

    function parseM3U(data) {
        const lines = data.split('\n');
        const list = document.getElementById('playlist');
        list.innerHTML = "";

        for (let i = 0; i < lines.length; i++) {
            if (lines[i].startsWith('#EXTINF:')) {
                const name = lines[i].split(',')[1];
                const url = lines[i+1].trim();
                const logo = lines[i].match(/tvg-logo="(.*?)"/)?.[1] || "";

                const div = document.createElement('div');
                div.className = "channel";
                div.innerHTML = `<img src="${logo}">${name}`;
                div.onclick = () => {
                    player.src({ src: url, type: 'application/x-mpegURL' });
                    player.play();
                };
                list.appendChild(div);
            }
        }
    }
</script>
</body>
</html>
