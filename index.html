<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAX VIP PLAYER - Full Control</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --brand-orange: #ff6600; --bg-dark: #0a0a0a; }
        body { 
            margin: 0; padding: 0; background: #000; color: white; 
            font-family: 'Segoe UI', Tahoma, sans-serif; overflow-x: hidden;
        }
        .container { max-width: 800px; margin: auto; padding: 15px; text-align: center; }
        
        /* Header & Logo */
        .logo-wrapper { position: relative; display: inline-block; margin: 15px 0; }
        .logo-glow { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 120px; height: 120px; border-radius: 50%; background: var(--brand-orange); 
            filter: blur(40px); opacity: 0.4; animation: pulse 3s infinite; z-index: -1; 
        }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.6; } }
        .brand-logo { width: 120px; border-radius: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }

        /* Login Box */
        .login-box { 
            background: rgba(255, 255, 255, 0.05); padding: 20px; border-radius: 20px; 
            backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); margin-bottom: 20px;
        }
        input { 
            padding: 12px; margin: 8px 0; width: 90%; border-radius: 10px; border: none; 
            background: #111; color: #fff; text-align: center; font-size: 14px;
        }
        .btn-load { 
            padding: 14px; background: linear-gradient(90deg, #ff6600, #ff9100); color: white; 
            border: none; cursor: pointer; border-radius: 10px; font-weight: bold; width: 95%; margin-top: 10px;
        }

        /* Player & Playlist Row */
        #main-app { display: none; }
        .video-wrapper { border-radius: 15px; overflow: hidden; margin-bottom: 20px; background: #000; }
        
        /* Playlist Styles */
        .playlist-container { 
            background: #111; border-radius: 15px; padding: 10px; 
            max-height: 400px; overflow-y: auto; text-align: right;
        }
        .search-bar { width: 95%; padding: 10px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; }
        .channel-item { 
            display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #222; 
            cursor: pointer; transition: 0.2s;
        }
        .channel-item:hover { background: #222; }
        .channel-item img { width: 40px; height: 40px; border-radius: 5px; margin-left: 15px; object-fit: cover; background: #333; }
        .channel-name { font-size: 14px; color: #eee; }

        #status { margin: 10px 0; font-size: 13px; color: var(--brand-orange); }
        .footer { font-size: 11px; color: #444; margin-top: 30px; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-wrapper">
        <div class="logo-glow"></div>
        <img src="https://i.postimg.cc/Y9nDffmm/IMG-20260322-165940-496.webp" class="brand-logo" alt="MAX VIP">
    </div>

    <div id="login-form" class="login-box">
        <h3 style="margin-top:0">مشغل MAX VIP</h3>
        <input type="text" id="host" placeholder="رابط السيرفر (مثال: http://host:port)">
        <input type="text" id="user" placeholder="اسم المستخدم">
        <input type="password" id="pass" placeholder="كلمة المرور">
        <div id="status"></div>
        <button class="btn-load" onclick="fetchM3U()">جلب قوائم التشغيل</button>
    </div>

    <div id="main-app">
        <div class="video-wrapper">
            <video id="my-video" class="video-js vjs-fluid vjs-big-play-centered" controls preload="auto"></video>
        </div>

        <input type="text" class="search-bar" id="search" placeholder="بحث عن قناة..." oninput="filterChannels()">
        
        <div class="playlist-container" id="playlist">
            </div>
    </div>

    <div class="footer">© 2026 MAX VIP STORE - ALL RIGHTS RESERVED</div>
</div>

<script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
<script>
    let allChannels = [];
    const player = videojs('my-video');

    async function fetchM3U() {
        const host = document.getElementById('host').value.replace(/\/$/, "");
        const user = document.getElementById('user').value;
        const pass = document.getElementById('pass').value;
        const status = document.getElementById('status');

        if (!host || !user || !pass) {
            status.innerText = "يرجى ملء جميع الحقول";
            return;
        }

        // الرابط الذي طلبته لجلب ملف الـ M3U
        const m3uUrl = `${host}/get.php?username=${user}&password=${pass}&type=m3u_plus&output=ts`;
        
        status.innerText = "جاري جلب القنوات... يرجى الانتظار";

        try {
            // ملاحظة: قد تحتاج لبروكسي (CORS Bypass) إذا كان المتصفح يمنع الجلب المباشر
            const response = await fetch(m3uUrl);
            const data = await response.text();
            
            if (data.includes("#EXTM3U")) {
                parseM3U(data);
                document.getElementById('login-form').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
            } else {
                status.innerText = "فشل في جلب البيانات، تأكد من صحة المعلومات";
            }
        } catch (error) {
            status.innerText = "خطأ في الاتصال بالسيرفر أو قيود من المتصفح";
            console.error(error);
        }
    }

    function parseM3U(data) {
        const lines = data.split('\n');
        allChannels = [];
        
        for (let i = 0; i < lines.length; i++) {
            if (lines[i].startsWith('#EXTINF:')) {
                const info = lines[i];
                const url = lines[i + 1] ? lines[i + 1].trim() : "";
                
                if (url && url.startsWith('http')) {
                    // استخراج اسم القناة والشعار
                    const nameMatch = info.match(/,(.*)$/);
                    const logoMatch = info.match(/tvg-logo="(.*?)"/);
                    
                    allChannels.push({
                        name: nameMatch ? nameMatch[1].trim() : "قناة غير معروفة",
                        logo: logoMatch ? logoMatch[1] : "",
                        url: url
                    });
                }
            }
        }
        renderPlaylist(allChannels);
    }

    function renderPlaylist(channels) {
        const container = document.getElementById('playlist');
        container.innerHTML = "";
        
        channels.forEach(ch => {
            const div = document.createElement('div');
            div.className = "channel-item";
            div.onclick = () => playChannel(ch.url);
            
            div.innerHTML = `
                <img src="${ch.logo || 'https://via.placeholder.com/40'}" onerror="this.src='https://via.placeholder.com/40'">
                <div class="channel-name">${ch.name}</div>
            `;
            container.appendChild(div);
        });
    }

    function filterChannels() {
        const term = document.getElementById('search').value.toLowerCase();
        const filtered = allChannels.filter(ch => ch.name.toLowerCase().includes(term));
        renderPlaylist(filtered);
    }

    function playChannel(url) {
        player.src({ src: url, type: 'application/x-mpegURL' });
        player.play();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
</script>
</body>
</html>
